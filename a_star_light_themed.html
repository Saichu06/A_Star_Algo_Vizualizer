<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A* Algorithm Visualizer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;600;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #f5f3ef;
    --surface: #ffffff;
    --surface2: #f0ede8;
    --border: #ddd9d1;
    --accent: #2563eb;
    --accent2: #e8490f;
    --accent3: #16a34a;
    --open: #2563eb;
    --closed: #e8490f;
    --path: #16a34a;
    --current: #d97706;
    --text: #1a1714;
    --muted: #8a8278;
    --glow: 0 4px 20px rgba(37,99,235,0.18);
    --shadow: 0 1px 4px rgba(0,0,0,0.07), 0 4px 16px rgba(0,0,0,0.06);
    --shadow-lg: 0 2px 8px rgba(0,0,0,0.08), 0 8px 32px rgba(0,0,0,0.08);
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
    background-image:
      radial-gradient(ellipse 80% 60% at 70% -10%, rgba(37,99,235,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 10% 100%, rgba(22,163,74,0.05) 0%, transparent 60%);
  }

  /* Subtle dot grid */
  body::before {
    content:'';
    position:fixed; inset:0;
    background-image: radial-gradient(circle, #c8c2b8 1px, transparent 1px);
    background-size: 28px 28px;
    opacity: 0.35;
    pointer-events:none; z-index:0;
  }

  header {
    padding: 18px 32px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
    z-index:1;
    background: rgba(255,255,255,0.9);
    backdrop-filter: blur(12px);
    box-shadow: var(--shadow);
  }

  .header-icon {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, var(--accent), #1d4ed8);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 17px;
    box-shadow: 0 2px 8px rgba(37,99,235,0.35);
    flex-shrink: 0;
  }

  header h1 {
    font-family: 'Syne', sans-serif;
    font-size: 21px;
    font-weight: 800;
    letter-spacing: -0.5px;
    color: var(--text);
  }

  header h1 span { color: var(--accent); }

  header .subtitle {
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-left: auto;
    background: var(--surface2);
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
  }

  .app {
    display: grid;
    grid-template-columns: 280px 1fr;
    gap: 0;
    height: calc(100vh - 69px);
    position: relative; z-index:1;
  }

  /* ── LEFT PANEL ── */
  .panel-left {
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: var(--surface);
    box-shadow: 2px 0 8px rgba(0,0,0,0.04);
  }

  .section {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }

  .section-label {
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .section-label::after {
    content:'';
    flex:1;
    height: 1px;
    background: var(--border);
  }

  /* Graph builder */
  .graph-builder { display: flex; flex-direction: column; gap: 8px; }

  .input-row {
    display: flex;
    gap: 7px;
    align-items: center;
  }

  input, select {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    padding: 7px 11px;
    border-radius: 8px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
  }

  input:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
    background: #fff;
  }

  input::placeholder { color: #b8b3ab; }

  input.small { width: 56px; flex-shrink:0; }

  .btn {
    background: var(--surface2);
    border: 1.5px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 7px 13px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    font-weight: 600;
  }

  .btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(37,99,235,0.05);
    box-shadow: 0 2px 8px rgba(37,99,235,0.12);
  }

  .btn-accent {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    font-weight: 700;
    box-shadow: 0 2px 8px rgba(37,99,235,0.3);
  }

  .btn-accent:hover {
    background: #1d4ed8;
    border-color: #1d4ed8;
    color: #fff;
    box-shadow: 0 4px 14px rgba(37,99,235,0.4);
    transform: translateY(-1px);
  }

  .btn-danger { border-color: #fca5a5; color: var(--accent2); background: #fff5f5; }
  .btn-danger:hover { background: var(--accent2); color: #fff; border-color: var(--accent2); }

  .edge-list {
    max-height: 120px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .edge-list::-webkit-scrollbar { width: 3px; }
  .edge-list::-webkit-scrollbar-track { background: var(--surface2); }
  .edge-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .edge-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 5px 10px;
    background: var(--surface2);
    border-radius: 6px;
    font-size: 11px;
    color: var(--muted);
    border: 1px solid transparent;
    transition: border-color 0.15s;
  }

  .edge-item:hover { border-color: var(--border); }
  .edge-item span { color: var(--text); font-weight: 500; }
  .edge-item .w-tag { color: var(--accent); font-weight: 700; }

  .edge-item button {
    background: none;
    border: none;
    color: #fca5a5;
    cursor: pointer;
    font-size: 13px;
    line-height: 1;
    padding: 0 3px;
    transition: color 0.15s;
  }

  .edge-item button:hover { color: var(--accent2); }

  /* Legend */
  .legend { display: flex; flex-wrap: wrap; gap: 8px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 10px; color: var(--muted); }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink:0; }

  /* Controls */
  .controls { display: flex; flex-direction: column; gap: 8px; }
  .controls-row { display: flex; gap: 7px; }

  /* Steps panel hidden on left - now at bottom of right panel */
  .steps-panel { display: none; }

  /* ── RIGHT PANEL ── */
  .panel-right {
    display: grid;
    grid-template-rows: auto 1fr auto auto;
    overflow: hidden;
    background: var(--bg);
    min-height: 0;
  }

  /* Tab bar */
  .tab-bar {
    display: flex;
    align-items: center;
    padding: 8px 12px 0;
    gap: 4px;
    background: var(--bg);
    flex-shrink: 0;
    border-bottom: 1.5px solid var(--border);
  }

  .tab-btn {
    padding: 7px 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    border: 1.5px solid transparent;
    border-bottom: none;
    border-radius: 8px 8px 0 0;
    cursor: pointer;
    background: var(--surface2);
    color: var(--muted);
    transition: all 0.15s;
    position: relative;
    bottom: -1.5px;
  }

  .tab-btn:hover { color: var(--accent); background: #fff; }

  .tab-btn.active {
    background: var(--surface);
    color: var(--accent);
    border-color: var(--border);
    border-bottom-color: var(--surface);
    box-shadow: 0 -2px 8px rgba(37,99,235,0.08);
  }

  .tab-btn .tab-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
    position: relative; top: -1px;
  }

  /* Info chips */
  .info-bar {
    display: flex;
    gap: 6px;
    align-items: center;
    margin-left: auto;
    flex-wrap: nowrap;
  }

  .info-chip {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 10px;
    background: var(--surface2);
    padding: 3px 9px 3px 6px;
    border-radius: 20px;
    border: 1px solid var(--border);
    white-space: nowrap;
  }

  .info-chip .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink:0; }
  .info-chip .val { color: var(--text); font-weight: 700; margin-left: 2px; }
  .info-chip span { color: var(--muted); }

  /* Tab panels */
  .tab-panels {
    min-height: 0;
    position: relative;
    overflow: hidden;
  }

  .tab-panel {
    position: absolute;
    inset: 0;
    display: none;
    flex-direction: column;
    padding: 10px 10px 6px;
  }

  .tab-panel.active { display: flex; }

  .viz-section {
    flex: 1;
    min-height: 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background: var(--surface);
    border-radius: 14px;
    box-shadow: var(--shadow-lg);
    border: 1px solid var(--border);
    padding: 14px 16px;
  }

  .viz-section-label {
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .viz-section-label::before {
    content:'';
    width: 3px; height: 12px;
    border-radius: 2px;
    background: var(--accent);
  }

  .graph-canvas-wrap {
    flex:1;
    min-height: 0;
    position: relative;
    overflow: hidden;
    border-radius: 8px;
    background: linear-gradient(135deg, #fafaf9 0%, #f5f3ef 100%);
    border: 1px solid var(--border);
  }

  svg { width:100%; height:100%; }

  /* ── STEPS BOTTOM STRIP ── */
  .steps-bottom {
    background: var(--surface);
    border-top: 2px solid var(--border);
    box-shadow: 0 -4px 20px rgba(0,0,0,0.07);
    overflow: hidden;
    transition: max-height 0.28s cubic-bezier(0.4,0,0.2,1);
    max-height: 192px;
  }

  .steps-bottom.collapsed { max-height: 43px; }

  .steps-bottom-header {
    display: flex;
    align-items: center;
    height: 43px;
    padding: 0 16px;
    gap: 10px;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  .steps-bottom.collapsed .steps-bottom-header { border-bottom: none; }
  .steps-bottom-header:hover { background: var(--surface2); }

  .steps-bottom-title {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .steps-count-badge {
    background: var(--accent);
    color: #fff;
    font-size: 9px;
    font-weight: 700;
    padding: 1px 8px;
    border-radius: 20px;
    min-width: 26px;
    text-align: center;
    font-family: 'Syne', sans-serif;
  }

  .steps-nav {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-left: auto;
  }

  .steps-nav-btn {
    width: 26px; height: 26px;
    border-radius: 6px;
    border: 1.5px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    font-family: 'JetBrains Mono', monospace;
  }

  .steps-nav-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(37,99,235,0.06); }

  .steps-play-btn {
    width: 28px; height: 28px;
    border-radius: 7px;
    background: var(--accent);
    border: none;
    color: #fff;
    font-size: 11px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 8px rgba(37,99,235,0.3);
    transition: all 0.15s;
  }

  .steps-play-btn:hover { background: #1d4ed8; transform: scale(1.05); }

  .steps-counter {
    font-size: 10px;
    color: var(--muted);
    font-weight: 600;
    white-space: nowrap;
  }

  .steps-collapse-icon {
    font-style: normal;
    font-size: 11px;
    color: var(--muted);
    transition: transform 0.25s;
    margin-left: 4px;
  }

  .steps-bottom.collapsed .steps-collapse-icon { transform: rotate(180deg); }

  .steps-scroll {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 10px 14px 12px;
    height: 149px;
    align-items: flex-start;
  }

  .steps-scroll::-webkit-scrollbar { height: 4px; }
  .steps-scroll::-webkit-scrollbar-track { background: var(--surface2); border-radius: 2px; }
  .steps-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── STEP CARDS ── */
  .step-card {
    flex-shrink: 0;
    width: 190px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    cursor: pointer;
    transition: all 0.15s;
    font-size: 11px;
    line-height: 1.5;
    opacity: 0.55;
    background: var(--surface2);
    height: 120px;
    overflow: hidden;
  }

  .step-card:hover { opacity: 0.88; border-color: #a5b4fc; transform: translateY(-2px); box-shadow: var(--shadow); }

  .step-card.active {
    border-color: var(--accent);
    background: linear-gradient(160deg, rgba(37,99,235,0.08), #fff);
    opacity: 1;
    box-shadow: 0 0 0 3px rgba(37,99,235,0.14), var(--shadow);
    transform: translateY(-3px);
  }

  .step-card.done { opacity: 0.82; background: var(--surface); }

  .step-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 5px;
  }

  .step-num {
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    font-weight: 600;
  }

  .step-tag {
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 0.5px;
    padding: 1px 7px;
    border-radius: 4px;
    border: 1px solid;
    text-transform: uppercase;
  }

  .step-title {
    color: var(--text);
    font-weight: 700;
    margin-bottom: 4px;
    font-size: 11px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .step-detail {
    color: var(--muted);
    font-size: 10px;
    line-height: 1.45;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .step-detail strong { color: var(--text); }

  /* ── MODAL SYSTEM ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(15, 20, 30, 0.45);
    backdrop-filter: blur(6px);
    z-index: 1000;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }

  .modal-overlay.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: #fff;
    border-radius: 18px;
    padding: 0;
    box-shadow: 0 8px 40px rgba(0,0,0,0.18), 0 2px 8px rgba(0,0,0,0.1);
    width: 420px;
    max-width: 90vw;
    transform: translateY(12px) scale(0.97);
    transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), opacity 0.2s;
    opacity: 0;
    overflow: hidden;
    border: 1px solid var(--border);
  }

  .modal-overlay.open .modal {
    transform: translateY(0) scale(1);
    opacity: 1;
  }

  .modal-header {
    padding: 22px 24px 16px;
    display: flex;
    align-items: flex-start;
    gap: 14px;
    border-bottom: 1px solid var(--border);
  }

  .modal-icon {
    width: 42px; height: 42px;
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .modal-icon.confirm { background: rgba(37,99,235,0.1); }
  .modal-icon.success { background: rgba(22,163,74,0.1); }
  .modal-icon.error { background: rgba(232,73,15,0.1); }
  .modal-icon.warn { background: rgba(217,119,6,0.1); }

  .modal-title {
    font-family: 'Syne', sans-serif;
    font-size: 17px;
    font-weight: 800;
    color: var(--text);
    margin-bottom: 4px;
    letter-spacing: -0.3px;
  }

  .modal-subtitle {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.5;
  }

  .modal-body {
    padding: 18px 24px;
  }

  .modal-result-path {
    background: linear-gradient(135deg, rgba(22,163,74,0.06), rgba(22,163,74,0.02));
    border: 1.5px solid rgba(22,163,74,0.25);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 12px;
  }

  .modal-result-path-label {
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--path);
    font-weight: 700;
    margin-bottom: 8px;
  }

  .modal-path-nodes {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
  }

  .modal-path-node {
    background: var(--path);
    color: #fff;
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 800;
    box-shadow: 0 2px 8px rgba(22,163,74,0.3);
  }

  .modal-path-arrow {
    color: var(--path);
    font-size: 14px;
    font-weight: 700;
  }

  .modal-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 8px;
  }

  .modal-stat {
    background: var(--surface2);
    border-radius: 8px;
    padding: 10px 12px;
    text-align: center;
    border: 1px solid var(--border);
  }

  .modal-stat-val {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    color: var(--text);
    line-height: 1;
    margin-bottom: 4px;
  }

  .modal-stat-label {
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .modal-footer {
    padding: 14px 24px 20px;
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    background: var(--surface2);
    border-top: 1px solid var(--border);
  }

  .modal-btn {
    padding: 9px 20px;
    border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text);
    letter-spacing: 0.5px;
  }

  .modal-btn:hover { background: var(--surface2); border-color: var(--muted); }

  .modal-btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 2px 8px rgba(37,99,235,0.28);
  }

  .modal-btn.primary:hover { background: #1d4ed8; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(37,99,235,0.38); }

  .modal-btn.success {
    background: var(--path);
    border-color: var(--path);
    color: #fff;
    box-shadow: 0 2px 8px rgba(22,163,74,0.28);
  }

  .modal-btn.success:hover { background: #15803d; }

  .modal-btn.danger {
    background: var(--accent2);
    border-color: var(--accent2);
    color: #fff;
    box-shadow: 0 2px 8px rgba(232,73,15,0.28);
  }

  .modal-btn.danger:hover { background: #c43d0c; }

  /* SVG elements */
  .edge-line {
    stroke: #d4cfc8;
    stroke-width: 2;
    transition: stroke 0.3s, stroke-width 0.3s;
  }

  .edge-line.path-edge {
    stroke: var(--path);
    stroke-width: 3.5;
    filter: drop-shadow(0 0 4px rgba(22,163,74,0.4));
  }

  .edge-weight {
    fill: #a09890;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    text-anchor: middle;
  }

  .node-circle {
    fill: #ffffff;
    stroke: #d4cfc8;
    stroke-width: 2;
    transition: fill 0.3s, stroke 0.3s, filter 0.3s;
    cursor: pointer;
    filter: drop-shadow(0 2px 6px rgba(0,0,0,0.1));
  }

  .node-circle.open-set {
    fill: rgba(37,99,235,0.08);
    stroke: var(--open);
    stroke-width: 2.5;
    filter: drop-shadow(0 2px 8px rgba(37,99,235,0.25));
  }
  .node-circle.closed-set {
    fill: rgba(232,73,15,0.08);
    stroke: var(--closed);
    stroke-width: 2.5;
    filter: drop-shadow(0 2px 8px rgba(232,73,15,0.2));
  }
  .node-circle.current {
    fill: rgba(217,119,6,0.1);
    stroke: var(--current);
    stroke-width: 3;
    filter: drop-shadow(0 2px 12px rgba(217,119,6,0.35));
  }
  .node-circle.path-node {
    fill: rgba(22,163,74,0.1);
    stroke: var(--path);
    stroke-width: 2.5;
    filter: drop-shadow(0 2px 10px rgba(22,163,74,0.3));
  }
  .node-circle.start-node { stroke: var(--accent); stroke-width: 3; }
  .node-circle.end-node { stroke: var(--accent2); stroke-width: 3; }

  .node-label {
    fill: #1a1714;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 800;
    text-anchor: middle;
    dominant-baseline: central;
    pointer-events: none;
  }

  .node-cost {
    fill: #a09890;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    text-anchor: middle;
    pointer-events: none;
  }

  /* Tree section */
  .tree-canvas-wrap {
    flex: 1;
    min-height: 0;
    overflow: auto;
    position: relative;
    border-radius: 8px;
    background: linear-gradient(135deg, #fafaf9 0%, #f5f3ef 100%);
    border: 1px solid var(--border);
  }

  .tree-canvas-wrap::-webkit-scrollbar { width: 4px; height: 4px; }
  .tree-canvas-wrap::-webkit-scrollbar-track { background: var(--surface2); }
  .tree-canvas-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Info bar - in tab bar area */

  /* Playback - removed, now inside steps-bottom */

  /* Result banner - removed, now modal */

  /* Tooltip */
  .tooltip {
    position: absolute;
    background: white;
    border: 1.5px solid var(--accent);
    border-radius: 8px;
    padding: 8px 12px;
    font-size: 11px;
    pointer-events: none;
    display: none;
    z-index: 100;
    line-height: 1.7;
    box-shadow: var(--shadow-lg);
  }

  /* Grid cols for set display */
  .sets-display {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-top: 4px;
  }

  .set-chip {
    padding: 2px 8px;
    border-radius: 20px;
    font-size: 10px;
    font-weight: 700;
    font-family: 'Syne', sans-serif;
  }

  .set-chip.open { background: rgba(37,99,235,0.1); color: var(--open); border: 1px solid rgba(37,99,235,0.25); }
  .set-chip.closed { background: rgba(232,73,15,0.1); color: var(--closed); border: 1px solid rgba(232,73,15,0.25); }
  .set-chip.path { background: rgba(22,163,74,0.1); color: var(--path); border: 1px solid rgba(22,163,74,0.25); }

  /* Preset graphs */
  .presets { display: flex; gap: 5px; flex-wrap: wrap; }
  .preset-btn { font-size: 10px; padding: 5px 11px; }

  .heuristic-row { display: flex; align-items: center; gap: 7px; }
  .heuristic-row label { font-size: 11px; color: var(--muted); white-space: nowrap; font-weight: 600; }

  /* Tree SVG */
  .tree-node rect {
    fill: #ffffff;
    stroke: #d4cfc8;
    stroke-width: 1.5;
    transition: fill 0.3s, stroke 0.3s;
    filter: drop-shadow(0 1px 4px rgba(0,0,0,0.08));
  }

  .tree-node.open-set rect { stroke: var(--open); fill: rgba(37,99,235,0.06); filter: drop-shadow(0 1px 6px rgba(37,99,235,0.2)); }
  .tree-node.closed-set rect { stroke: var(--closed); fill: rgba(232,73,15,0.06); }
  .tree-node.current rect { stroke: var(--current); fill: rgba(217,119,6,0.08); filter: drop-shadow(0 1px 8px rgba(217,119,6,0.25)); }
  .tree-node.path-node rect { stroke: var(--path); fill: rgba(22,163,74,0.08); filter: drop-shadow(0 1px 6px rgba(22,163,74,0.2)); }

  .tree-node text {
    fill: #1a1714;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-anchor: middle;
    dominant-baseline: central;
    pointer-events: none;
  }

  .tree-node .node-name {
    fill: var(--accent);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 800;
  }

  .tree-edge {
    stroke: #d4cfc8;
    stroke-width: 1.5;
    fill: none;
  }

  .tree-edge.path-edge {
    stroke: var(--path);
    stroke-width: 2.5;
    filter: drop-shadow(0 0 3px rgba(22,163,74,0.35));
  }

  @keyframes fadeIn {
    from { opacity:0; transform: translateX(-4px); }
    to { opacity:1; transform: translateX(0); }
  }

  .step-card { animation: fadeIn 0.18s ease; }

  .empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #c8c2b8;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    flex-direction: column;
    gap: 8px;
  }

  .empty-state::before {
    content: '◦ ◦ ◦';
    font-size: 18px;
    letter-spacing: 4px;
  }

  /* Responsive */
  @media (max-width: 900px) {
    .app { grid-template-columns: 1fr; height: auto; }
    .panel-left { border-right: none; border-bottom: 1px solid var(--border); max-height: 60vh; }
    .panel-right { height: 90vh; }
  }
</style>
</head>
<body>

<header>
  <div class="header-icon">⭐</div>
  <h1>A<span>*</span> Visualizer</h1>
  <span class="subtitle">Step-by-step pathfinding</span>
</header>

<div class="app">

  <!-- LEFT PANEL -->
  <div class="panel-left">

    <div class="section">
      <div class="section-label">Preset Graphs</div>
      <div class="presets">
        <button class="btn preset-btn" onclick="loadPreset('simple')">Simple</button>
        <button class="btn preset-btn" onclick="loadPreset('medium')">City Grid</button>
        <button class="btn preset-btn" onclick="loadPreset('complex')">Complex</button>
        <button class="btn preset-btn btn-danger" onclick="clearGraph()">Clear</button>
      </div>
    </div>

    <div class="section">
      <div class="section-label">Graph Builder</div>
      <div class="graph-builder">

        <div class="input-row">
          <input id="nodeInput" placeholder="Node name (e.g. A, B, C…)" maxlength="3" style="text-transform:uppercase" />
          <input id="hInput" class="small" placeholder="h" title="Heuristic value" type="number" min="0" />
          <button class="btn" onclick="addNode()">+ Node</button>
        </div>

        <div class="input-row">
          <select id="fromNode"></select>
          <select id="toNode"></select>
          <input id="weightInput" class="small" placeholder="w" type="number" min="1" value="1" />
          <button class="btn" onclick="addEdge()">+ Edge</button>
        </div>

        <div class="edge-list" id="edgeList"></div>

        <div class="input-row">
          <div class="heuristic-row" style="width:100%">
            <label>Start:</label>
            <select id="startNode" style="flex:1"></select>
            <label>Goal:</label>
            <select id="goalNode" style="flex:1"></select>
          </div>
        </div>

      </div>
    </div>

    <div class="section">
      <div class="section-label">Controls</div>
      <div class="controls">
        <div class="controls-row">
          <button class="btn btn-accent" style="flex:1" onclick="runAStar()">▶ Run A*</button>
          <button class="btn" onclick="resetViz()">↺ Reset</button>
        </div>
        <div class="input-row">
          <label style="font-size:11px;color:var(--muted);white-space:nowrap">Speed:</label>
          <input type="range" id="speedSlider" min="100" max="2000" value="800" style="flex:1;height:3px;background:var(--border);border:none;padding:0;border-radius:2px">
          <span id="speedLabel" style="font-size:10px;color:var(--muted);min-width:40px">0.8s</span>
        </div>
      </div>
    </div>

  </div>

  <!-- RIGHT PANEL -->
  <div class="panel-right">

    <!-- Tab bar with info chips -->
    <div class="tab-bar">
      <button class="tab-btn active" id="tabGraph" onclick="switchTab('graph')">
        <span class="tab-dot" style="background:var(--accent)"></span>Graph
      </button>
      <button class="tab-btn" id="tabTree" onclick="switchTab('tree')">
        <span class="tab-dot" style="background:var(--path)"></span>Search Tree
      </button>
      <div class="info-bar" id="infoBar" style="display:none">
        <div class="info-chip"><div class="dot" style="background:var(--current)"></div><span>Current</span></div>
        <div class="info-chip"><div class="dot" style="background:var(--open)"></div><span>Open:&nbsp;</span><span class="val" id="openSetDisp">—</span></div>
        <div class="info-chip"><div class="dot" style="background:var(--closed)"></div><span>Closed:&nbsp;</span><span class="val" id="closedSetDisp">—</span></div>
        <div class="info-chip"><div class="dot" style="background:var(--path)"></div><span>Path:&nbsp;</span><span class="val" id="pathDisp">—</span></div>
      </div>
    </div>

    <!-- Tab panels -->
    <div class="tab-panels">
      <div class="tab-panel active" id="panelGraph">
        <div class="viz-section">
          <div class="viz-section-label">Graph Visualization</div>
          <div class="graph-canvas-wrap">
            <svg id="graphSvg"></svg>
            <div class="tooltip" id="tooltip"></div>
          </div>
        </div>
      </div>
      <div class="tab-panel" id="panelTree">
        <div class="viz-section">
          <div class="viz-section-label">Search Tree (Exploration Order)</div>
          <div class="tree-canvas-wrap" id="treeWrap">
            <div class="empty-state">Tree will appear here</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Steps bottom strip -->
    <div class="steps-bottom collapsed" id="stepsBottom">
      <div class="steps-bottom-header" onclick="toggleStepsPanel()">
        <div class="steps-bottom-title">
          Steps Log
          <span class="steps-count-badge" id="stepsBadge">0</span>
        </div>
        <div class="steps-nav" id="stepsNav" style="display:none">
          <button class="steps-nav-btn" onclick="event.stopPropagation();stepTo(currentStep-1)">&#8249;</button>
          <button class="steps-play-btn" id="stepsAutoBtn" onclick="event.stopPropagation();toggleAuto()">&#9654;</button>
          <button class="steps-nav-btn" onclick="event.stopPropagation();stepTo(currentStep+1)">&#8250;</button>
          <span class="steps-counter" id="stepsCounter">0 / 0</span>
          <label style="font-size:10px;color:var(--muted);margin-left:6px">Speed:</label>
          <input type="range" id="speedSlider" min="100" max="2000" value="800"
            style="width:70px;height:3px;background:var(--border);border:none;padding:0;border-radius:2px;outline:none;cursor:pointer"
            oninput="updateSpeed(this.value)" onclick="event.stopPropagation()">
          <span id="speedLabel" style="font-size:10px;color:var(--muted);min-width:30px">0.8s</span>
        </div>
        <i class="steps-collapse-icon">&#8679;</i>
      </div>
      <div class="steps-scroll" id="stepsPanel">
        <div class="empty-state" style="height:100%;width:100%;display:flex;align-items:center;justify-content:center;color:#c8c2b8;font-size:11px;letter-spacing:2px;text-transform:uppercase">Run A* to see steps</div>
      </div>
    </div>

  </div>
</div>

<!-- ── MODAL OVERLAY ── -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnBg(event)">
  <div class="modal" id="modal">
    <div class="modal-header" id="modalHeader"></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-footer" id="modalFooter"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  MODAL SYSTEM
// ═══════════════════════════════════════════
let modalResolve = null;

function showModal({ icon, iconClass, title, subtitle, body, buttons }) {
  return new Promise(resolve => {
    modalResolve = resolve;
    document.getElementById('modalHeader').innerHTML = `
      <div class="modal-icon ${iconClass}">${icon}</div>
      <div>
        <div class="modal-title">${title}</div>
        ${subtitle ? `<div class="modal-subtitle">${subtitle}</div>` : ''}
      </div>`;
    document.getElementById('modalBody').innerHTML = body || '';
    document.getElementById('modalFooter').innerHTML = buttons.map(b =>
      `<button class="modal-btn ${b.cls||''}" onclick="resolveModal('${b.value}')">${b.label}</button>`
    ).join('');
    document.getElementById('modalOverlay').classList.add('open');
  });
}

function resolveModal(value) {
  document.getElementById('modalOverlay').classList.remove('open');
  if (modalResolve) { modalResolve(value); modalResolve = null; }
}

function closeModalOnBg(e) {
  if (e.target === document.getElementById('modalOverlay')) resolveModal('cancel');
}

function showConfirm({ icon, iconClass, title, subtitle, confirmLabel, confirmCls, cancelLabel }) {
  return showModal({
    icon, iconClass, title, subtitle, body: '',
    buttons: [
      { label: cancelLabel || 'Cancel', value: 'cancel', cls: '' },
      { label: confirmLabel || 'Confirm', value: 'confirm', cls: confirmCls || 'primary' }
    ]
  });
}

function showResultModal(found, path, cost, totalSteps, start, goal) {
  if (found) {
    const pathHtml = path.map((n,i) =>
      `<span class="modal-path-node">${n}</span>${i<path.length-1?'<span class="modal-path-arrow">&#8594;</span>':''}`
    ).join('');
    showModal({
      icon: '&#10003;',
      iconClass: 'success',
      title: 'Path Found!',
      subtitle: `A* successfully found the optimal path from <strong>${start}</strong> to <strong>${goal}</strong>`,
      body: `
        <div class="modal-result-path">
          <div class="modal-result-path-label">Optimal Path</div>
          <div class="modal-path-nodes">${pathHtml}</div>
        </div>
        <div class="modal-stats">
          <div class="modal-stat">
            <div class="modal-stat-val" style="color:var(--path)">${cost}</div>
            <div class="modal-stat-label">Total Cost</div>
          </div>
          <div class="modal-stat">
            <div class="modal-stat-val" style="color:var(--accent)">${path.length}</div>
            <div class="modal-stat-label">Nodes in Path</div>
          </div>
          <div class="modal-stat">
            <div class="modal-stat-val" style="color:var(--muted)">${totalSteps}</div>
            <div class="modal-stat-label">Total Steps</div>
          </div>
        </div>`,
      buttons: [
        { label: 'Step Through', value: 'step', cls: '' },
        { label: 'View Path', value: 'ok', cls: 'success' }
      ]
    });
  } else {
    showModal({
      icon: '&#10005;',
      iconClass: 'error',
      title: 'No Path Found',
      subtitle: `There is no path from <strong>${start}</strong> to <strong>${goal}</strong> in this graph.`,
      body: `<div class="modal-stats">
        <div class="modal-stat" style="grid-column:1/-1">
          <div class="modal-stat-val" style="color:var(--accent2)">${totalSteps}</div>
          <div class="modal-stat-label">Steps Explored</div>
        </div>
      </div>`,
      buttons: [{ label: 'Close', value: 'ok', cls: 'danger' }]
    });
  }
}

// ═══════════════════════════════════════════
//  STEPS BOTTOM PANEL
// ═══════════════════════════════════════════
function toggleStepsPanel() {
  document.getElementById('stepsBottom').classList.toggle('collapsed');
}

function updateSpeed(val) {
  document.getElementById('speedLabel').textContent = (val/1000).toFixed(1)+'s';
  if (autoTimer) { toggleAuto(); toggleAuto(); }
}

// ═══════════════════════════════════════════
//  GRAPH STATE
// ═══════════════════════════════════════════
// ═══════════════════════════════════════════
//  GRAPH STATE
// ═══════════════════════════════════════════
let nodes = {}; // name -> { h, x, y }
let edges = []; // { from, to, w }
let steps = [];
let currentStep = -1;
let autoTimer = null;

// ── Node positions (auto-layout circle) ──
function layoutNodes() {
  const names = Object.keys(nodes);
  const n = names.length;
  const svg = document.getElementById('graphSvg');
  const W = svg.clientWidth || 600;
  const H = svg.clientHeight || 300;
  const cx = W/2, cy = H/2;
  const r = Math.min(W, H) * 0.36;
  names.forEach((name, i) => {
    if (!nodes[name].manual) {
      const angle = (2 * Math.PI * i / n) - Math.PI/2;
      nodes[name].x = cx + r * Math.cos(angle);
      nodes[name].y = cy + r * Math.sin(angle);
    }
  });
}

// ── Selects ──
function refreshSelects() {
  const names = Object.keys(nodes);
  ['fromNode','toNode','startNode','goalNode'].forEach(id => {
    const sel = document.getElementById(id);
    const prev = sel.value;
    sel.innerHTML = names.map(n => `<option value="${n}">${n}</option>`).join('');
    if (names.includes(prev)) sel.value = prev;
  });
}

function addNode() {
  let name = document.getElementById('nodeInput').value.trim().toUpperCase();
  let h = parseFloat(document.getElementById('hInput').value) || 0;
  if (!name) return showModal({ icon:'!', iconClass:'warn', title:'Missing Name', subtitle:'Please enter a node name before adding.', buttons:[{label:'OK',value:'ok',cls:'primary'}] });
  if (nodes[name]) return showModal({ icon:'!', iconClass:'warn', title:'Node Exists', subtitle:`Node <strong>${name}</strong> already exists in the graph.`, buttons:[{label:'OK',value:'ok',cls:'primary'}] });
  nodes[name] = { h, x: null, y: null, manual: false };
  document.getElementById('nodeInput').value = '';
  document.getElementById('hInput').value = '';
  layoutNodes();
  refreshSelects();
  renderGraph();
}

function addEdge() {
  const from = document.getElementById('fromNode').value;
  const to = document.getElementById('toNode').value;
  const w = parseFloat(document.getElementById('weightInput').value) || 1;
  if (!from || !to || from === to) return showModal({ icon:'!', iconClass:'warn', title:'Invalid Edge', subtitle:'Please select two different nodes to connect.', buttons:[{label:'OK',value:'ok',cls:'primary'}] });
  if (edges.find(e => (e.from===from&&e.to===to)||(e.from===to&&e.to===from))) return showModal({ icon:'!', iconClass:'warn', title:'Edge Exists', subtitle:`An edge between <strong>${from}</strong> and <strong>${to}</strong> already exists.`, buttons:[{label:'OK',value:'ok',cls:'primary'}] });
  edges.push({ from, to, w });
  renderEdgeList();
  renderGraph();
}

function removeEdge(i) {
  edges.splice(i, 1);
  renderEdgeList();
  renderGraph();
}

function clearGraph() {
  showConfirm({
    icon: '&#9003;',
    iconClass: 'warn',
    title: 'Clear Graph?',
    subtitle: 'This will remove all nodes, edges, and reset the visualizer.',
    confirmLabel: 'Clear All',
    confirmCls: 'danger',
    cancelLabel: 'Cancel'
  }).then(res => {
    if (res !== 'confirm') return;
    nodes = {}; edges = []; steps = []; currentStep = -1;
    nodeState = {}; stepScores = {}; pathEdges = new Set();
    document.getElementById('edgeList').innerHTML = '';
    document.getElementById('stepsPanel').innerHTML = '<div class="empty-state" style="height:100%;width:100%;display:flex;align-items:center;justify-content:center;color:#c8c2b8;font-size:11px;letter-spacing:2px;text-transform:uppercase">Run A* to see steps</div>';
    document.getElementById('infoBar').style.display = 'none';
    document.getElementById('treeWrap').innerHTML = '<div class="empty-state">Tree will appear here</div>';
    document.getElementById('stepsBadge').textContent = '0';
    document.getElementById('stepsNav').style.display = 'none';
    document.getElementById('stepsBottom').classList.add('collapsed');
    if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
    refreshSelects();
    renderGraph();
  });
}

function renderEdgeList() {
  document.getElementById('edgeList').innerHTML = edges.map((e,i) =>
    `<div class="edge-item">
      <span>${e.from} ↔ ${e.to}</span>
      <span class="w-tag">w=${e.w}</span>
      <button onclick="removeEdge(${i})">×</button>
    </div>`
  ).join('');
}

// ═══════════════════════════════════════════
//  GRAPH SVG RENDER
// ═══════════════════════════════════════════
let nodeState = {}; // name -> class string
let pathEdges = new Set();

function renderGraph(highlightPath=[]) {
  const svg = document.getElementById('graphSvg');
  const W = svg.clientWidth || 600;
  const H = svg.clientHeight || 300;
  svg.innerHTML = '';

  // defs
  svg.innerHTML = `<defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="var(--muted)" />
    </marker>
  </defs>`;

  const names = Object.keys(nodes);
  if (!names.length) return;

  layoutNodes();

  const R = 24;

  // Draw edges
  edges.forEach(e => {
    const a = nodes[e.from], b = nodes[e.to];
    if (!a || !b) return;

    const key = [e.from,e.to].sort().join('-');
    const isPath = pathEdges.has(key);

    const line = document.createElementNS('http://www.w3.org/2000/svg','line');
    line.setAttribute('x1', a.x); line.setAttribute('y1', a.y);
    line.setAttribute('x2', b.x); line.setAttribute('y2', b.y);
    line.setAttribute('class', `edge-line${isPath?' path-edge':''}`);
    svg.appendChild(line);

    // Weight label
    const mx = (a.x+b.x)/2, my = (a.y+b.y)/2;
    const dx = b.y-a.y, dy = -(b.x-a.x);
    const len = Math.sqrt(dx*dx+dy*dy)||1;
    const lx = mx + 12*dx/len, ly = my + 12*dy/len;

    const wt = document.createElementNS('http://www.w3.org/2000/svg','text');
    wt.setAttribute('x', lx); wt.setAttribute('y', ly);
    wt.setAttribute('class','edge-weight');
    wt.textContent = e.w;
    svg.appendChild(wt);
  });

  // Draw nodes
  names.forEach(name => {
    const nd = nodes[name];
    const g = document.createElementNS('http://www.w3.org/2000/svg','g');
    g.style.cursor = 'grab';

    const state = nodeState[name] || '';
    const start = document.getElementById('startNode').value;
    const goal = document.getElementById('goalNode').value;
    let extraClass = '';
    if (name === start) extraClass += ' start-node';
    if (name === goal) extraClass += ' end-node';

    const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx', nd.x); circle.setAttribute('cy', nd.y); circle.setAttribute('r', R);
    circle.setAttribute('class', `node-circle ${state}${extraClass}`);
    g.appendChild(circle);

    const label = document.createElementNS('http://www.w3.org/2000/svg','text');
    label.setAttribute('x', nd.x); label.setAttribute('y', nd.y - 3);
    label.setAttribute('class','node-label'); label.textContent = name;
    g.appendChild(label);

    // Show g/f scores if available
    if (stepScores[name]) {
      const sc = stepScores[name];
      const cost = document.createElementNS('http://www.w3.org/2000/svg','text');
      cost.setAttribute('x', nd.x); cost.setAttribute('y', nd.y + 14);
      cost.setAttribute('class','node-cost');
      cost.textContent = `g=${sc.g} f=${sc.f}`;
      g.appendChild(cost);
    } else if (nodes[name].h !== undefined) {
      const hLabel = document.createElementNS('http://www.w3.org/2000/svg','text');
      hLabel.setAttribute('x', nd.x); hLabel.setAttribute('y', nd.y + 14);
      hLabel.setAttribute('class','node-cost');
      hLabel.textContent = `h=${nd.h}`;
      g.appendChild(hLabel);
    }

    // Drag
    makeDraggable(g, name, nd);

    svg.appendChild(g);
  });

  // Start/Goal labels
  const start = document.getElementById('startNode').value;
  const goal = document.getElementById('goalNode').value;
  if (nodes[start]) addBadge(svg, nodes[start].x, nodes[start].y - R - 8, 'START', 'var(--accent)');
  if (nodes[goal] && goal !== start) addBadge(svg, nodes[goal].x, nodes[goal].y - R - 8, 'GOAL', 'var(--accent2)');
}

function addBadge(svg, x, y, text, color) {
  const t = document.createElementNS('http://www.w3.org/2000/svg','text');
  t.setAttribute('x', x); t.setAttribute('y', y);
  t.setAttribute('text-anchor','middle');
  t.setAttribute('font-family',"'Syne', sans-serif");
  t.setAttribute('font-size','9');
  t.setAttribute('font-weight','800');
  t.setAttribute('letter-spacing','1');
  t.setAttribute('fill', color);
  t.textContent = text;
  svg.appendChild(t);
}

function makeDraggable(g, name, nd) {
  let dragging = false, ox, oy;
  g.addEventListener('mousedown', e => {
    dragging = true;
    ox = e.clientX - nd.x;
    oy = e.clientY - nd.y;
    nd.manual = true;
    e.stopPropagation();
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const svg = document.getElementById('graphSvg');
    const rect = svg.getBoundingClientRect();
    nd.x = Math.max(30, Math.min(rect.width-30, e.clientX - rect.left));
    nd.y = Math.max(30, Math.min(rect.height-30, e.clientY - rect.top));
    renderGraph();
  });
  document.addEventListener('mouseup', () => { dragging = false; });
}

// ═══════════════════════════════════════════
//  A* ALGORITHM
// ═══════════════════════════════════════════
let stepScores = {};

function getNeighbors(name) {
  return edges
    .filter(e => e.from===name || e.to===name)
    .map(e => ({ name: e.from===name ? e.to : e.from, w: e.w }));
}

async function runAStar() {
  const start = document.getElementById('startNode').value;
  const goal = document.getElementById('goalNode').value;
  if (!start || !goal) return showModal({ icon:'!', iconClass:'warn', title:'Incomplete Setup', subtitle:'Please select both a Start and a Goal node.', buttons:[{label:'OK',value:'ok',cls:'primary'}] });
  if (!nodes[start] || !nodes[goal]) return showModal({ icon:'!', iconClass:'warn', title:'Invalid Nodes', subtitle:'The selected nodes do not exist in the graph.', buttons:[{label:'OK',value:'ok',cls:'primary'}] });

  if (steps.length > 0) {
    const res = await showConfirm({
      icon: '&#9654;',
      iconClass: 'confirm',
      title: 'Run A* Again?',
      subtitle: `This will restart the algorithm from <strong>${start}</strong> to <strong>${goal}</strong>, clearing the previous run.`,
      confirmLabel: 'Run A*',
      confirmCls: 'primary',
      cancelLabel: 'Cancel'
    });
    if (res !== 'confirm') return;
  }

  steps = [];
  stepScores = {};
  nodeState = {};
  pathEdges = new Set();

  const g = {};
  const f = {};
  const parent = {};
  const openSet = new Set([start]);
  const closedSet = new Set();

  Object.keys(nodes).forEach(n => { g[n]=Infinity; f[n]=Infinity; });
  g[start] = 0;
  f[start] = nodes[start].h || 0;

  // Tree structure
  const treeNodes = {}; // name -> { parent, children[], order }
  treeNodes[start] = { parent: null, children: [], order: 0 };
  let treeOrder = 0;

  recordStep({
    type: 'init',
    title: `Initialize: Start = ${start}`,
    detail: `Open={<strong>${start}</strong>} g(${start})=0 f(${start})=${f[start]}`,
    openSet: new Set(openSet),
    closedSet: new Set(closedSet),
    current: null,
    parent: {...parent},
    g: {...g}, f: {...f},
    treeNodes: JSON.parse(JSON.stringify(treeNodes)),
    path: null
  });

  let found = false;

  while (openSet.size > 0) {
    // Pick node with lowest f
    let current = [...openSet].reduce((a,b) => f[a]<=f[b] ? a : b);

    recordStep({
      type: 'pick',
      title: `Pick lowest f: ${current}`,
      detail: `f(${current})=${f[current]} g=${g[current]} h=${nodes[current].h||0}`,
      openSet: new Set(openSet),
      closedSet: new Set(closedSet),
      current,
      parent: {...parent},
      g: {...g}, f: {...f},
      treeNodes: JSON.parse(JSON.stringify(treeNodes)),
      path: null
    });

    if (current === goal) {
      // Reconstruct path
      const path = [];
      let c = goal;
      while (c) { path.unshift(c); c = parent[c]; }
      for (let i=0;i<path.length-1;i++) {
        pathEdges.add([path[i],path[i+1]].sort().join('-'));
      }
      recordStep({
        type: 'found',
        title: `Goal ${goal} reached`,
        detail: `Path: <strong>${path.join(' → ')}</strong> | Cost: <strong>${g[goal]}</strong>`,
        openSet: new Set(openSet),
        closedSet: new Set(closedSet),
        current,
        parent: {...parent},
        g: {...g}, f: {...f},
        treeNodes: JSON.parse(JSON.stringify(treeNodes)),
        path
      });
      found = true;
      break;
    }

    openSet.delete(current);
    closedSet.add(current);

    recordStep({
      type: 'close',
      title: `Move ${current} to Closed`,
      detail: `Closed={${[...closedSet].join(',')}}`,
      openSet: new Set(openSet),
      closedSet: new Set(closedSet),
      current,
      parent: {...parent},
      g: {...g}, f: {...f},
      treeNodes: JSON.parse(JSON.stringify(treeNodes)),
      path: null
    });

    const neighbors = getNeighbors(current);

    neighbors.forEach(({name: nb, w}) => {
      if (closedSet.has(nb)) {
        recordStep({
          type: 'skip',
          title: `Skip ${nb} (already closed)`,
          detail: `${nb} is in Closed set, skip.`,
          openSet: new Set(openSet),
          closedSet: new Set(closedSet),
          current,
          parent: {...parent},
          g: {...g}, f: {...f},
          treeNodes: JSON.parse(JSON.stringify(treeNodes)),
          path: null
        });
        return;
      }

      const tentativeG = g[current] + w;
      const hNb = nodes[nb].h || 0;
      const tentativeF = tentativeG + hNb;

      if (tentativeG < g[nb]) {
        parent[nb] = current;
        g[nb] = tentativeG;
        f[nb] = tentativeF;

        // Add to tree
        if (!treeNodes[nb]) {
          treeOrder++;
          treeNodes[nb] = { parent: current, children: [], order: treeOrder };
          if (treeNodes[current]) treeNodes[current].children.push(nb);
        } else {
          // Update parent (better path found)
          const oldParent = treeNodes[nb].parent;
          if (oldParent && treeNodes[oldParent]) {
            treeNodes[oldParent].children = treeNodes[oldParent].children.filter(c=>c!==nb);
          }
          treeNodes[nb].parent = current;
          if (treeNodes[current] && !treeNodes[current].children.includes(nb)) {
            treeNodes[current].children.push(nb);
          }
        }

        if (!openSet.has(nb)) openSet.add(nb);

        recordStep({
          type: 'update',
          title: `Update ${nb} via ${current}`,
          detail: `g(${nb})=${tentativeG} h=${hNb} f(${nb})=${tentativeF}`,
          openSet: new Set(openSet),
          closedSet: new Set(closedSet),
          current,
          parent: {...parent},
          g: {...g}, f: {...f},
          treeNodes: JSON.parse(JSON.stringify(treeNodes)),
          path: null
        });
      } else {
        recordStep({
          type: 'no-improve',
          title: `No improvement for ${nb}`,
          detail: `tentative g=${tentativeG} >= current g=${g[nb]}`,
          openSet: new Set(openSet),
          closedSet: new Set(closedSet),
          current,
          parent: {...parent},
          g: {...g}, f: {...f},
          treeNodes: JSON.parse(JSON.stringify(treeNodes)),
          path: null
        });
      }
    });
  }

  if (!found) {
    recordStep({
      type: 'no-path',
      title: `No path found`,
      detail: `Open set exhausted. ${goal} is unreachable from ${start}.`,
      openSet: new Set(),
      closedSet: new Set(closedSet),
      current: null,
      parent: {...parent},
      g: {...g}, f: {...f},
      treeNodes: JSON.parse(JSON.stringify(treeNodes)),
      path: null
    });
  }

  renderStepCards();
  document.getElementById('stepsBadge').textContent = steps.length;
  document.getElementById('stepsNav').style.display = 'flex';
  document.getElementById('infoBar').style.display = 'flex';
  document.getElementById('stepsBottom').classList.remove('collapsed');
  stepTo(0);

  // Show result modal after a short delay
  const lastStep = steps[steps.length - 1];
  const foundPath = lastStep.type === 'found';
  const pathArr = foundPath ? lastStep.path : [];
  const costVal = foundPath ? lastStep.g[pathArr[pathArr.length-1]] : 0;
  setTimeout(() => showResultModal(foundPath, pathArr, costVal, steps.length, start, goal), 300);
}

function recordStep(data) {
  steps.push(data);
}

// ═══════════════════════════════════════════
//  STEP RENDERING
// ═══════════════════════════════════════════
function stepTo(i) {
  if (!steps.length) return;
  i = Math.max(0, Math.min(steps.length-1, i));
  currentStep = i;

  const s = steps[i];

  // Update scores
  stepScores = {};
  Object.keys(nodes).forEach(n => {
    if (s.g[n] !== undefined && s.g[n] !== Infinity) {
      stepScores[n] = { g: s.g[n], f: s.f[n] };
    }
  });

  // Update node states
  nodeState = {};
  if (s.closedSet) s.closedSet.forEach(n => nodeState[n]='closed-set');
  if (s.openSet) s.openSet.forEach(n => nodeState[n]='open-set');
  if (s.current) nodeState[s.current]='current';
  if (s.path) s.path.forEach(n => nodeState[n]='path-node');

  // Path edges
  pathEdges = new Set();
  if (s.path) {
    for (let j=0;j<s.path.length-1;j++) {
      pathEdges.add([s.path[j],s.path[j+1]].sort().join('-'));
    }
  }

  renderGraph();
  renderTree(s.treeNodes, s.current, s.openSet, s.closedSet, s.path);

  // Info bar
  document.getElementById('openSetDisp').textContent = s.openSet?.size ? [...s.openSet].join(', ') : '∅';
  document.getElementById('closedSetDisp').textContent = s.closedSet?.size ? [...s.closedSet].join(', ') : '∅';
  document.getElementById('pathDisp').textContent = s.path ? s.path.join(' → ') : '—';

  // Step counter
  document.getElementById('stepsCounter').textContent = `${i+1} / ${steps.length}`;

  // Highlight step card and scroll horizontally
  document.querySelectorAll('.step-card').forEach((el,j) => {
    el.classList.remove('active','done');
    if (j===i) el.classList.add('active');
    else if (j<i) el.classList.add('done');
  });

  const active = document.querySelector('.step-card.active');
  if (active) {
    const scroll = document.getElementById('stepsPanel');
    const cardLeft = active.offsetLeft;
    const cardRight = cardLeft + active.offsetWidth;
    const scrollLeft = scroll.scrollLeft;
    const scrollRight = scrollLeft + scroll.clientWidth;
    if (cardLeft < scrollLeft + 20) scroll.scrollLeft = cardLeft - 20;
    else if (cardRight > scrollRight - 20) scroll.scrollLeft = cardRight - scroll.clientWidth + 20;
  }
}

function renderStepCards() {
  const panel = document.getElementById('stepsPanel');
  const typeTag = {
    init:'INIT', pick:'PICK', close:'CLOSE', update:'UPDATE',
    skip:'SKIP', 'no-improve':'SAME', found:'DONE', 'no-path':'FAIL'
  };
  const typeColor = {
    init:'var(--accent)', pick:'var(--current)', close:'var(--closed)', update:'var(--accent)',
    skip:'var(--muted)', 'no-improve':'var(--muted)', found:'var(--path)', 'no-path':'var(--accent2)'
  };
  panel.innerHTML = steps.map((s,i) =>
    `<div class="step-card" onclick="stepTo(${i})">
      <div class="step-card-header">
        <span class="step-num">STEP ${i+1}</span>
        <span class="step-tag" style="background:${typeColor[s.type]}18;color:${typeColor[s.type]};border-color:${typeColor[s.type]}40">${typeTag[s.type]||'·'}</span>
      </div>
      <div class="step-title">${s.title}</div>
      <div class="step-detail">${s.detail}</div>
    </div>`
  ).join('');
}

async function resetViz() {
  if (steps.length === 0) return;
  const res = await showConfirm({
    icon: '&#8635;',
    iconClass: 'warn',
    title: 'Reset Visualization?',
    subtitle: 'This will clear all steps and reset the graph to its initial state.',
    confirmLabel: 'Reset',
    confirmCls: 'danger',
    cancelLabel: 'Cancel'
  });
  if (res !== 'confirm') return;

  if (autoTimer) { clearInterval(autoTimer); autoTimer=null; }
  steps = []; currentStep = -1;
  nodeState = {}; stepScores = {}; pathEdges = new Set();
  document.getElementById('stepsPanel').innerHTML = '<div class="empty-state" style="height:100%;width:100%;display:flex;align-items:center;justify-content:center;color:#c8c2b8;font-size:11px;letter-spacing:2px;text-transform:uppercase">Run A* to see steps</div>';
  document.getElementById('infoBar').style.display = 'none';
  document.getElementById('treeWrap').innerHTML = '<div class="empty-state">Tree will appear here</div>';
  document.getElementById('stepsBadge').textContent = '0';
  document.getElementById('stepsNav').style.display = 'none';
  document.getElementById('stepsBottom').classList.add('collapsed');
  document.getElementById('stepsAutoBtn').innerHTML = '&#9654;';
  renderGraph();
}

// ═══════════════════════════════════════════
//  AUTO PLAY
// ═══════════════════════════════════════════
function toggleAuto() {
  if (autoTimer) {
    clearInterval(autoTimer); autoTimer = null;
    document.getElementById('stepsAutoBtn').innerHTML = '&#9654;';
  } else {
    const speed = parseInt(document.getElementById('speedSlider').value);
    document.getElementById('stepsAutoBtn').innerHTML = '&#9646;&#9646;';
    autoTimer = setInterval(() => {
      if (currentStep >= steps.length - 1) {
        clearInterval(autoTimer); autoTimer = null;
        document.getElementById('stepsAutoBtn').innerHTML = '&#9654;';
      } else {
        stepTo(currentStep + 1);
      }
    }, speed);
  }
}
function renderTree(treeNodes, current, openSet, closedSet, path) {
  const wrap = document.getElementById('treeWrap');
  if (!treeNodes || !Object.keys(treeNodes).length) return;

  // Find root
  const root = Object.keys(treeNodes).find(n => !treeNodes[n].parent) || Object.keys(treeNodes)[0];

  // Compute layout (Reingold-Tilford simplified)
  const nodeW = 70, nodeH = 50, levelH = 80, padding = 14;

  function treeWidth(name, memo={}) {
    if (memo[name]) return memo[name];
    const children = treeNodes[name]?.children || [];
    if (!children.length) { memo[name]=nodeW+padding; return memo[name]; }
    memo[name] = children.reduce((s,c)=>s+treeWidth(c,memo), 0);
    return memo[name];
  }

  const totalW = Math.max(treeWidth(root), nodeW+padding);
  let maxDepth = 0;

  const positions = {};
  function layout(name, depth, left) {
    if (depth>maxDepth) maxDepth=depth;
    const children = treeNodes[name]?.children || [];
    let x;
    if (!children.length) {
      x = left + nodeW/2;
    } else {
      let cur = left;
      children.forEach(c => {
        layout(c, depth+1, cur);
        cur += treeWidth(c);
      });
      const firstX = positions[children[0]].x;
      const lastX = positions[children[children.length-1]].x;
      x = (firstX+lastX)/2;
    }
    positions[name] = { x, y: depth*(levelH) + 40 };
  }
  layout(root, 0, 0);

  const svgW = Math.max(totalW + 40, 400);
  const svgH = (maxDepth+1)*levelH + 80;

  let svgStr = `<svg width="${svgW}" height="${svgH}" xmlns="http://www.w3.org/2000/svg" style="font-family:'JetBrains Mono',monospace">`;

  // Edges
  Object.keys(treeNodes).forEach(name => {
    const par = treeNodes[name].parent;
    if (!par || !positions[name] || !positions[par]) return;
    const px = positions[par].x, py = positions[par].y;
    const cx2 = positions[name].x, cy2 = positions[name].y;

    const isPathEdge = path && path.includes(name) && path.includes(par) &&
      Math.abs(path.indexOf(name)-path.indexOf(par))===1;

    svgStr += `<path d="M${px},${py+22} C${px},${(py+cy2)/2+10} ${cx2},${(py+cy2)/2-10} ${cx2},${cy2-22}"
      class="tree-edge${isPathEdge?' path-edge':''}" />`;
  });

  // Nodes
  Object.keys(treeNodes).forEach(name => {
    if (!positions[name]) return;
    const {x,y} = positions[name];
    const gData = steps[currentStep]?.g[name];
    const fData = steps[currentStep]?.f[name];
    const hData = nodes[name]?.h || 0;

    let state = '';
    if (path && path.includes(name)) state='path-node';
    else if (name===current) state='current';
    else if (closedSet && closedSet.has(name)) state='closed-set';
    else if (openSet && openSet.has(name)) state='open-set';

    const bw=64, bh=44;
    svgStr += `<g class="tree-node ${state}" transform="translate(${x},${y})">
      <rect x="${-bw/2}" y="${-bh/2}" width="${bw}" height="${bh}" rx="7"/>
      <text class="node-name" y="-8" text-anchor="middle" dominant-baseline="central">${name}</text>
      <text y="8" text-anchor="middle" dominant-baseline="central" style="fill:var(--muted);font-size:9px">
        ${gData!==undefined&&gData!==Infinity?`g=${gData} f=${fData!==Infinity?fData:'∞'}`:`h=${hData}`}
      </text>
    </g>`;
  });

  svgStr += '</svg>';
  wrap.innerHTML = svgStr;
}

// ═══════════════════════════════════════════
//  PRESETS
// ═══════════════════════════════════════════
function loadPreset(name) {
  // Direct reset without modal for presets
  if (autoTimer) { clearInterval(autoTimer); autoTimer=null; }
  nodes = {}; edges = []; steps = []; currentStep = -1;
  nodeState = {}; stepScores = {}; pathEdges = new Set();
  document.getElementById('edgeList').innerHTML = '';
  document.getElementById('stepsPanel').innerHTML = '<div class="empty-state" style="height:100%;width:100%;display:flex;align-items:center;justify-content:center;color:#c8c2b8;font-size:11px;letter-spacing:2px;text-transform:uppercase">Run A* to see steps</div>';
  document.getElementById('infoBar').style.display = 'none';
  document.getElementById('treeWrap').innerHTML = '<div class="empty-state">Tree will appear here</div>';
  document.getElementById('stepsBadge').textContent = '0';
  document.getElementById('stepsNav').style.display = 'none';
  document.getElementById('stepsBottom').classList.add('collapsed');

  if (name==='simple') {
    const ns = {A:{h:6},B:{h:4},C:{h:4},D:{h:2},E:{h:0},F:{h:5}};
    Object.entries(ns).forEach(([n,d]) => { nodes[n]={...d,x:null,y:null,manual:false}; });
    edges = [
      {from:'A',to:'B',w:1},{from:'A',to:'C',w:4},
      {from:'B',to:'D',w:3},{from:'B',to:'E',w:7},
      {from:'C',to:'D',w:2},{from:'D',to:'E',w:2},
      {from:'A',to:'F',w:5},{from:'F',to:'E',w:3}
    ];
  } else if (name==='medium') {
    const ns = {A:{h:10},B:{h:7},C:{h:8},D:{h:5},E:{h:3},F:{h:6},G:{h:0}};
    Object.entries(ns).forEach(([n,d]) => { nodes[n]={...d,x:null,y:null,manual:false}; });
    edges = [
      {from:'A',to:'B',w:2},{from:'A',to:'C',w:3},
      {from:'B',to:'D',w:4},{from:'B',to:'E',w:1},
      {from:'C',to:'F',w:5},{from:'D',to:'G',w:2},
      {from:'E',to:'G',w:6},{from:'F',to:'G',w:3},
      {from:'C',to:'D',w:7}
    ];
  } else if (name==='complex') {
    const ns = {A:{h:12},B:{h:9},C:{h:10},D:{h:7},E:{h:5},F:{h:8},G:{h:4},H:{h:2},I:{h:0}};
    Object.entries(ns).forEach(([n,d]) => { nodes[n]={...d,x:null,y:null,manual:false}; });
    edges = [
      {from:'A',to:'B',w:1},{from:'A',to:'C',w:3},{from:'A',to:'F',w:6},
      {from:'B',to:'D',w:4},{from:'B',to:'E',w:2},
      {from:'C',to:'F',w:2},{from:'C',to:'G',w:5},
      {from:'D',to:'H',w:3},{from:'E',to:'H',w:5},
      {from:'F',to:'G',w:1},{from:'G',to:'I',w:4},
      {from:'H',to:'I',w:2},{from:'D',to:'G',w:6}
    ];
  }
  refreshSelects();
  const ns = Object.keys(nodes);
  if (ns.length>=2) {
    document.getElementById('startNode').value = ns[0];
    document.getElementById('goalNode').value = ns[ns.length-1];
  }
  renderEdgeList();
  layoutNodes();
  renderGraph();
}

// ═══════════════════════════════════════════
//  TAB SWITCHING
// ═══════════════════════════════════════════
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
  document.getElementById('panel' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
  if (name === 'graph') {
    layoutNodes();
    renderGraph();
  }
}

// Initial render
window.addEventListener('resize', () => {
  Object.keys(nodes).forEach(n => { if(!nodes[n].manual) nodes[n].manual=false; });
  layoutNodes();
  renderGraph();
});

// Load a preset on start
loadPreset('simple');
</script>
